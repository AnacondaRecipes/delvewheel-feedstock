{% set name = "delvewheel" %}
{% set version = "1.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/delvewheel-{{ version }}.tar.gz
  sha256: b804b65ae60d4225919594107c1b565dabcfa1565b764b3d8be95fcb38062e79

build:
  entry_points:
    - delvewheel = delvewheel.__main__:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=70.1.0
    - pip
  run:
    - python
    - pefile >=2024.8.26

test:
  imports:
    - delvewheel
  commands:
    - pip check
    - delvewheel --help
  requires:
    - python
    - pip

about:
  home: https://github.com/adang1345/delvewheel
  summary: Self-contained wheels for Windows
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: |
    delvewheel is a command-line tool for creating self-contained Python
    wheel packages for Windows that have DLL dependencies that may not be
    present on the target system.
    It is functionally similar to auditwheel (for Linux) and delocate (for macOS).
  doc_url: https://github.com/adang1345/delvewheel
  dev_url: https://github.com/adang1345/delvewheel

extra:
  recipe-maintainers:
    - ocefpaf
